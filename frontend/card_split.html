<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#000}canvas{display:block}</style></head>
<body><canvas id="c"></canvas><script>
const W=1200,H=675, SPLIT=740;
const fmt=s=>{const sec=Number(s);const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return `${h}h ${m.toString().padStart(2,'0')}m`;};
const d={handle:"salmo.nad",wallet:"0xe5952336bec8baf564a01f4ddd211128c38b255e",weeklySeconds:16200n,totalSeconds:5400n,streak:7n,xp:270n,level:2n};
const score=Math.min(100,Math.round(Number(d.weeklySeconds)*100/(7*3600*8)));
const P={
  mono:{INK:"#ffffff",INK_DIM:"#9aa0a6",INK_FAINT:"#5f646b",PANEL:"#141414",LINE:"#2a2a2a",ACCENT:"#e6e6e6",G1:"#101010",G2:"#0a0a0a",ART1:"#1c1c1c",ART2:"#0a0a0a"},
  purple:{INK:"#ffffff",INK_DIM:"#c4b5ff",INK_FAINT:"#9d7bff",PANEL:"#15102e",LINE:"#3a2d6e",ACCENT:"#9d7bff",G1:"#1e1147",G2:"#0a0518",ART1:"#3a1d7a",ART2:"#0d0820"},
  red:{INK:"#ffffff",INK_DIM:"#ff8a8a",INK_FAINT:"#ff4d4d",PANEL:"#2a0a0a",LINE:"#5a1a1a",ACCENT:"#ff3b3b",G1:"#3a0a0a",G2:"#140404",ART1:"#7a1d1d",ART2:"#140404"}
}[location.hash.slice(1)||"mono"];
const cv=document.getElementById('c'); cv.width=W; cv.height=H; const ctx=cv.getContext('2d');
// left bg
const bgL=ctx.createLinearGradient(0,0,0,H); bgL.addColorStop(0,P.G1); bgL.addColorStop(1,P.G2); ctx.fillStyle=bgL; ctx.fillRect(0,0,SPLIT,H);
// right art panel (placeholder gradient)
const bgR=ctx.createLinearGradient(SPLIT,0,W,H); bgR.addColorStop(0,P.ART2); bgR.addColorStop(1,P.ART1); ctx.fillStyle=bgR; ctx.fillRect(SPLIT,0,W-SPLIT,H);
// right glow
const rg=ctx.createRadialGradient((SPLIT+W)/2,H/2,40,(SPLIT+W)/2,H/2,300); rg.addColorStop(0,P.ACCENT+"44"); rg.addColorStop(1,P.ACCENT+"00"); ctx.fillStyle=rg; ctx.fillRect(SPLIT,0,W-SPLIT,H);
// split divider
ctx.strokeStyle=P.LINE; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(SPLIT,28); ctx.lineTo(SPLIT,H-28); ctx.stroke();
// outer frame
ctx.strokeStyle=P.LINE; ctx.lineWidth=2; ctx.strokeRect(28,28,W-56,H-56);
// faint grid left
ctx.strokeStyle="rgba(255,255,255,0.04)"; ctx.lineWidth=1;
for(let x=0;x<=SPLIT;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<=H;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(SPLIT,y);ctx.stroke();}
// LEFT header
const M=64;
ctx.textBaseline="alphabetic";
ctx.fillStyle=P.INK; ctx.font="800 34px 'Arial Black','Helvetica Neue',Arial,sans-serif"; ctx.textAlign="left"; ctx.fillText("Fokusle", M, 92);
ctx.fillStyle=P.INK_DIM; ctx.font="700 16px 'Helvetica Neue',Arial,sans-serif"; ctx.textAlign="right";
const tag="PROOF OF FOCUS"; let tx=SPLIT-40; for(let i=tag.length-1;i>=0;i--){ctx.fillText(tag[i],tx,88);tx-=ctx.measureText(tag[i]).width+3;}
ctx.textAlign="left";
// BIG SCORE BOX (eye-catching, ala AXIOM/GMGN)
const bx=M, by=130, bw=SPLIT-M-40, bh=190;
ctx.fillStyle=P.ACCENT; ctx.fillRect(bx,by,bw,bh);
ctx.fillStyle=P.G2; ctx.font="800 20px 'Helvetica Neue',Arial,sans-serif"; ctx.textAlign="left"; ctx.fillText("FOCUS SCORE", bx+28, by+44);
ctx.fillStyle=P.G2; ctx.font="900 120px 'Arial Black','Helvetica Neue',Arial,sans-serif"; ctx.textAlign="left";
ctx.fillText(score+"%", bx+24, by+158);
// secondary stats (3 col small)
const sx=M, sy=350, sw=(SPLIT-M-40-2*20)/3, sh=110;
const stats=[["TODAY",fmt(d.totalSeconds<d.weeklySeconds?d.totalSeconds:d.weeklySeconds)],["WEEKLY",fmt(d.weeklySeconds)],["STREAK",d.streak+"D"]];
stats.forEach(([l,v],i)=>{ const x=sx+i*(sw+20); ctx.fillStyle=P.PANEL; ctx.fillRect(x,sy,sw,sh); ctx.strokeStyle=P.LINE; ctx.lineWidth=1; ctx.strokeRect(x,sy,sw,sh);
  ctx.fillStyle=P.INK_FAINT; ctx.font="700 15px 'Helvetica Neue',Arial,sans-serif"; ctx.fillText(l,x+16,sy+34);
  ctx.fillStyle=P.INK; ctx.font="900 30px 'Arial Black',Arial,sans-serif"; ctx.fillText(v,x+16,sy+74); });
// footer left
ctx.fillStyle=P.INK; ctx.font="800 22px 'Helvetica Neue',Arial,sans-serif"; ctx.textAlign="left"; ctx.fillText("@"+d.handle, M, H-56);
ctx.fillStyle=P.INK_DIM; ctx.font="500 18px 'SFMono-Regular',Consolas,monospace"; ctx.textAlign="left";
ctx.fillText(d.wallet.slice(0,8)+"…"+d.wallet.slice(-6), M, H-30);
ctx.fillStyle=P.INK_FAINT; ctx.font="600 13px 'Helvetica Neue',Arial,sans-serif"; ctx.textAlign="center";
ctx.fillText("MONAD TESTNET · WALLET = IDENTITY", (SPLIT)/2, H-8);
// RIGHT panel label (placeholder art note)
ctx.fillStyle=P.ACCENT+"66"; ctx.font="700 15px 'Helvetica Neue',Arial,sans-serif"; ctx.textAlign="center";
ctx.fillText("// ART PLACEHOLDER", (SPLIT+W)/2, H-30);
ctx.fillStyle=P.INK_FAINT; ctx.font="600 12px 'Helvetica Neue',Arial,sans-serif"; ctx.textAlign="center";
ctx.fillText("LOCKED IN", (SPLIT+W)/2, 60);
</script></body></html>
